<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Game Backlog Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; }
        .navbar { background-color: #1a1a2e !important; }
        .card { background-color: #1e1e2e; border: 1px solid #333; }
        .table { color: #e0e0e0; }
        .table-dark { background-color: #1e1e2e; }
        .badge-backlog    { background-color: #6c757d; }
        .badge-playing    { background-color: #0d6efd; }
        .badge-completed  { background-color: #198754; }
        .badge-dropped    { background-color: #dc3545; }
        .btn-action { font-size: 0.8rem; padding: 2px 8px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🎮 Game Backlog Tracker</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/games">Games</a>
            <a class="nav-link" href="/platforms">Platforms</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
