{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Platforms</h2>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addPlatformModal">
        + Add Platform
    </button>
</div>

<div class="card p-3">
    <table class="table table-dark table-hover align-middle">
        <thead>
            <tr><th>ID</th><th>Name</th><th>Manufacturer</th><th>Actions</th></tr>
        </thead>
        <tbody>
            {% for p in platforms %}
            <tr>
                <td style="color: #adb5bd;">{{ p.platform_id }}</td>
                <td class="fw-semibold">{{ p.name }}</td>
                <td>{{ p.manufacturer }}</td>
                <td>
                    <button class="btn btn-sm btn-outline-light btn-action"
                        data-bs-toggle="modal"
                        data-bs-target="#editPlatform{{ p.platform_id }}">Edit</button>
                    <form action="/platforms/delete/{{ p.platform_id }}" method="post" class="d-inline">
                        <button class="btn btn-sm btn-outline-danger btn-action"
                            onclick="return confirm('Delete platform and all related games?')">Del</button>
                    </form>
                </td>
            </tr>

            <!-- Edit Modal -->
            <div class="modal fade" id="editPlatform{{ p.platform_id }}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content bg-dark text-light">
                        <div class="modal-header">
                            <h5 class="modal-title">Edit — {{ p.name }}</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <form action="/platforms/update/{{ p.platform_id }}" method="post">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Name</label>
                                    <input type="text" name="name" class="form-control bg-dark text-light"
                                        value="{{ p.name }}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Manufacturer</label>
                                    <input type="text" name="manufacturer" class="form-control bg-dark text-light"
                                        value="{{ p.manufacturer }}" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Add Platform Modal -->
<div class="modal fade" id="addPlatformModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header">
                <h5 class="modal-title">Add Platform</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form action="/platforms/add" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control bg-dark text-light" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Manufacturer</label>
                        <input type="text" name="manufacturer" class="form-control bg-dark text-light" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Add Platform</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
